<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Series</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

<style>
.header-tv{
    background-color:#17a2b8;
    padding:8px;
    width:60%;
}

.header-tv h3{
    color:black;
    margin:0;
}

.table thead th{
    background-color:white;
}

.table tbody tr{
    background-color:#f2f2f2;
}

.bold-id{
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container mt-4">

    <div class="header-tv d-flex align-items-center">
        <img src="./tv.png" width="40" class="mr-2">
        <h3>TV Series</h3>
    </div>

    <table class="table mt-2" style="width:50%">
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Channel</th>
                <th>Seasons</th>
            </tr>
        </thead>

        <tbody id="series">
        </tbody>

    </table>

</div>

<script type="module" src="./scripts/serie.js"></script>
<script type="module" src="./scripts/dataSeries.js"></script>
<script type="module" src="./scripts/main.js"></script>

</body>
</html>
